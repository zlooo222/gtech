<style>
a {
  text-decoration: none;
  color: inherit;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
color:white;
background:black;
}

/* HERO SECTION */

.hero{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:50px 0; /* controls header height */
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
pointer-events:none;
}

/* NAVBAR */

.navbar {
  position: absolute;
  top: 30px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 80px;
  z-index: 1000;
}

.logo{
  font-weight:bold;
  letter-spacing:8px;
  margin-left:20px; /* ✅ match visual spacing */
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
  text-decoration:none;
  font-weight:bold;
  color:white;
  opacity:.8;
  font-size:18px;
  padding:8px 12px; /* 👈 adds space around text */
  transition:0.3s;
}

.nav-links a:hover{
  opacity:1;
}

.nav-book-btn{
  background:white;
  color:black;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
    margin-right:20px;
}

/* HERO CONTENT */

.hero-content{
position:absolute;
top:160px;
left:80px;
z-index:5;
}

.hero-title{
font-size:140px;
font-weight:700;
letter-spacing:10px;
opacity:.35;
}

/* CARDS */

.card-row{
position:absolute;
bottom:120px;
left:80px;
display:flex;
gap:20px;
z-index:5;
}

.info-card{
width:140px;
height:170px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(5px);
border-radius:12px;
padding:10px;
display:flex;
align-items:flex-end;
font-size:14px;
}

/* BOOK BUTTON */

.hero-book{
position:absolute;
bottom:140px;
right:120px;
background:white;
color:black;
border:none;
padding:10px 50px;
border-radius:5px;
font-size:16px;
cursor:pointer;
z-index:5;
}

/* SECTION */

.section{
padding:120px 80px;
background:black;
}

.section-title{
font-size:36px;
letter-spacing:2px;
margin-bottom:50px;
display:flex;
align-items:center;
gap:20px;
}

.section-title:before,
.section-title:after{
content:"";
flex:1;
height:1px;
background:#777;
}

/* POPULAR HOUSES */

.houses{
background:#f3f3f3;
color:#111;
padding:100px 80px;
}

.houses-title{
  font-size: 20px;
  letter-spacing: 3px;
  margin-bottom: 25px;
  font-weight: 600;
}

.houses-title:before{
content:"";
position:absolute;
left:0;
top:6px;
height:50px;
width:3px;
background:#3f7d54;
border-radius:2px;
}

.houses-title span{
font-size:18px;
color:#777;
margin-right:10px;
}

.houses-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:80px;
align-items:start;
justify-content:center; /* centers the layout */
max-width:1100px;
margin:auto; /* center horizontally */
}

/* FEATURE CARD */

.house-feature{
height:450px;
border-radius:16px;
background:url("bgninabueno.jpg") center/cover no-repeat;
position:relative;
overflow:hidden;
}

.house-feature-info{
position:absolute;
bottom:15px;
left:15px;
color:white;
}

.house-feature-info h3{
font-size:18px;
margin-bottom:4px;
}

.house-list{
  background: #eaf6ff; /* ✅ VERY LIGHT BLUE */

  border-radius: 16px;
  padding: 25px 20px;
  width: 500px;

  border: 1px solid rgba(0,0,255,0.1);

  box-shadow: 
    0 10px 30px rgba(0, 120, 255, 0.2),
    0 0 15px rgba(0, 180, 255, 0.15);

  color: #111;
}

.description{
font-size:14px;
color:#555;
line-height:1.5;
max-width:400px;
}

.house-feature{
height:820px;
border-radius:16px;
background:url("infog/1.png") center/cover no-repeat;
position:relative;
overflow:hidden;
cursor:pointer;
transition:transform .3s ease;
display:block;
}

.house-feature:hover{
transform:scale(1.03);
}

/* TOC ITEM */

.toc-item{
  display:flex;
  align-items:center;
  padding:8px 0;
}

.toc-item:first-child .toc-dots{
  display:none;
}

/* hover effect */

.toc-item:hover{
color:#ddd;
transform:translateX(6px);
}

/* text */

.toc-text{
white-space:nowrap;
font-weight:500;
}

/* dotted line */

.toc-dots{
  flex:1;
  height:0; /* remove thickness */
  border-bottom:2px dotted #0a2a8a; /* ✅ dotted dark blue */
  margin:0 12px;
}

/* page number */

.toc-page{
white-space:nowrap;
font-size:14px;
opacity:.7;
}

/* BOTTOM CONTROLS */

.house-bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.dots{
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#ccc;
border-radius:50%;
}

.dot.active{
background:#111;
}

.view-btn{
background:#3f7d54;
color:white;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* BOOK POPUP */

.book-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.hide-navbar .navbar{
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
}

/* BOOK CONTAINER */

.book-wrapper{
position:relative;
display:flex;
align-items:center;
gap:20px;
}

/* BOOK SPREAD */

.book-spread{
display:flex;
border-radius:10px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
perspective:1500px;
position:relative;

width:700px;     /* book width */
height:700px;    /* book height */
}

.page{
position:absolute;
top:0;
width:50%;
height:100%;
transform-style:preserve-3d;
transition:transform 1s ease;
z-index:1;
}


#leftPage{
left:0;
transform-origin:right;
}

#rightPage{
left:50%;
transform-origin:left;
}

.front, .back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}

.front img,
.back img{
width:100%;
height:100%;
object-fit:contain; /* keeps full image visible */
display:block;
}

.back{
transform:rotateY(180deg);
}

.flip{
transform:rotateY(-180deg);
z-index:10;
}

.flip-back{
transform:rotateY(180deg);
z-index:10;
}

/* CLOSE BUTTON */

.close-book{
position:absolute;
top:30px;
right:40px;
font-size:18px;
background:white;
border:none;
padding:5px 9px;
cursor:pointer;
border-radius:5px;
}
/* MAGNIFY BUTTON */

.magnify-btn {
  
  background: white;
  border: none;
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  z-index: 2000;
}


/* MAGNIFIER LENS */

.magnifier-lens{
position:absolute;
width:300px;
height:300px;
border-radius:50%;
border:4px solid white;
display:none;
pointer-events:none;
background-repeat:no-repeat;
background-size:2000px 2000px;
z-index:999;
}

/* FOOTER SECTION */

.footer{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:50px 0;
}

.footer-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

.footer-content{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 80px;
z-index:5;
}

.footer-logo{
font-weight:bold;
letter-spacing:8px;
margin-left:20px; /* adjust this value */
}

.footer-links{
display:flex;
gap:30px;
}

.footer-links a{
  text-decoration:none;
  font-weight:bold;
  color:white;
  opacity:.8;
  font-size:18px;
  padding:8px 12px; /* 👈 adds space around text */
  transition:0.3s;
}

.footer-links a:hover{
  opacity:1;
}

.navbar,
.footer-content {
  padding: 0 80px;
}


/* BOOK DROPDOWN */

.book-dropdown{
position:relative;
}

.nav-book-btn{
   background:white;
  color:black;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
    margin-right:20px;

}

.book-dropdown button:focus{
  outline:none;
}

/* Dropdown menu */

.dropdown-content{
display:none;
position:absolute;
top:35px;
right:0;
background:rgba(0,0,0,0.9);
border-radius:8px;
min-width:150px;
overflow:hidden;
}

.dropdown-content a{
display:block;
padding:10px 15px;
text-decoration:none;
color:white;
font-size:14px;
}

.dropdown-content a:hover{
background:rgba(255,255,255,0.15);
}

/* Show dropdown */

.dropdown-content{
  display: none;
  position: absolute;
  top: 100%;         /* always below button */
  margin-top: 10px;  /* space between button & dropdown */
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 8px;
  min-width: 150px;
  overflow: hidden;
  z-index: 10;
}
.footer .dropdown-content{
  top: auto;            /* remove downward behavior */
  bottom: 100%;         /* 👈 attach to top of button */
  margin-bottom: 10px;  /* 👈 spacing from button */
}
.footer .nav-book-btn{
  margin-right:20px;
}

.nav-btn {
  background: white;
  border: none;
  padding: 12px 18px;
  font-size: 14px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 1000;
  transition: 0.3s;
}

.nav-btn:hover {
  background: #ddd;
}

/* ================= CLEAN BOOK CONTROLS ================= */

.nav-btn,
.magnify-btn {
  position: fixed;
  bottom: 15px;

  background: white;
  border: none;

  padding: 8px 12px;        /* 🔥 smaller */
  font-size: 12px;          /* 🔥 smaller text */
  border-radius: 6px;       /* 🔥 tighter */

  cursor: pointer;
  z-index: 3000;

  display: flex;
  align-items: center;
  justify-content: center;

  min-width: 70px;          /* 🔥 prevents long buttons */
  height: 36px;             /* 🔥 consistent height */
}

/* LEFT (PREV) */
.nav-btn.left {
  left: 15px;
}

/* RIGHT (NEXT) */
.nav-btn.right {
  right: 15px;
}

/* CENTER (MAGNIFY) */
.magnify-btn {
  left: 50%;
  transform: translateX(-50%);
  min-width: auto;          /* 🔥 no stretching */
  width: 42px;              /* 🔥 square button */
  height: 36px;
  font-size: 16px;
}

/* HOVER */
.nav-btn:hover,
.magnify-btn:hover {
  background: #ddd;
}

/* ---------------- RESPONSIVE FIX ---------------- */

@media (max-width:1100px){

/* reduce side padding */

.navbar,
.footer-content,
.section,
.contact,
.houses{

/* feature image height smaller */

  .nav-btn.left {

<div class="magnifier-lens" id="lens"></div>

<div class="page" id="leftPage">

  <div class="front"><img id="leftFront"></div>
  <div class="back"><img id="leftBack"></div>
</div>

<div class="page" id="rightPage">
  <div class="front"><img id="rightFront"></div>
  <div class="back"><img id="rightBack"></div>
</div>

</div>

  </div>

</div>
<script>

/* ================= DROPDOWN ================= */

const bookButtons = document.querySelectorAll('.nav-book-btn');

bookButtons.forEach(button => {

  const dropdown = button.nextElementSibling;

  button.addEventListener('click', (e) => {
    e.stopPropagation();

    // close all other dropdowns first
    document.querySelectorAll('.dropdown-content').forEach(menu => {
      if(menu !== dropdown){
        menu.style.display = 'none';
      }
    });

    // toggle current
    dropdown.style.display =
      dropdown.style.display === 'block' ? 'none' : 'block';
  });

});

/* CLOSE ONLY WHEN CLICK OUTSIDE */
document.addEventListener('click', (e) => {

  if(!e.target.closest('.book-dropdown')){
    document.querySelectorAll('.dropdown-content').forEach(menu => {
      menu.style.display = 'none';
    });
  }

});


/* ================= BOOK ================= */

const openBook = document.getElementById("openBook");
const popup = document.getElementById("bookPopup");
const closeBook = document.getElementById("closeBook");

const leftFront = document.getElementById("leftFront");
const leftBack = document.getElementById("leftBack");
const rightFront = document.getElementById("rightFront");
const rightBack = document.getElementById("rightBack");

const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

const next = document.getElementById("nextPage");
const prev = document.getElementById("prevPage");

const bookSpread = document.querySelector(".book-spread"); // ✅ FIX
const lens = document.getElementById("lens"); // ✅ FIX

let zoomActive = false; // ✅ FIX

const pages = [
"infog/1.png",
"infog/2.png",
"infog/3.png",
"infog/4.png",
"infog/5.png",
"infog/6.png",
"infog/7.png",
"infog/8.png",
];

let current = 0;


/* OPEN */

openBook.addEventListener("click", function(e){
  e.preventDefault();
  popup.style.display = "flex";

  document.body.classList.add("hide-navbar"); // ✅ hide navbar

  showPages();
});

/* CLOSE */

closeBook.addEventListener("click", ()=>{
  popup.style.display = "none";
  document.body.classList.remove("hide-navbar"); // 🔥 important
});

/* SHOW PAGES */

function showPages(){

  leftFront.src = pages[current];
  rightFront.src = pages[current+1] || "";

  leftBack.src = pages[current-1] || "";
  rightBack.src = pages[current+2] || "";

  next.style.display = (current + 2 >= pages.length) ? "none" : "block";
  prev.style.display = (current === 0) ? "none" : "block";
}


/* NEXT */

next.addEventListener("click", ()=>{

  if(current + 2 >= pages.length) return;

  rightPage.classList.add("flip");

  setTimeout(()=>{

    rightPage.style.transition = "none";
    current += 2;
    rightPage.classList.remove("flip");
    showPages();

    rightPage.offsetHeight;

    rightPage.style.transition = "transform 1s ease";

  },1000);
});


/* PREV */

prev.addEventListener("click", ()=>{

  if(current - 2 >= 0){

    leftPage.classList.add("flip-back");

    setTimeout(()=>{

      leftPage.style.transition = "none";
      current -= 2;
      leftPage.classList.remove("flip-back");
      showPages();

      leftPage.offsetHeight;

      leftPage.style.transition = "transform 1s ease";

    },1000);

  }

});


/* ================= MAGNIFIER ================= */

const magnifyBtn = document.getElementById("magnifyBtn");

magnifyBtn.addEventListener("click", ()=>{
  zoomActive = !zoomActive;
  lens.style.display = zoomActive ? "block" : "none";
});


function updateLens(clientX, clientY){

  if(!zoomActive) return;

  const rect = bookSpread.getBoundingClientRect();

  let x = clientX - rect.left;
  let y = clientY - rect.top;

  lens.style.left = (x - lens.offsetWidth/2) + "px";
  lens.style.top = (y - lens.offsetHeight/2) + "px";

  let targetImg = null;

  [leftFront, rightFront].forEach(img=>{
    const r = img.getBoundingClientRect();
    if(clientX >= r.left && clientX <= r.right &&
       clientY >= r.top && clientY <= r.bottom){
      targetImg = img;
    }
  });

  if(targetImg){

    lens.style.backgroundImage = `url(${targetImg.src})`;

    let imgRect = targetImg.getBoundingClientRect();

    let posX = ((clientX - imgRect.left) / imgRect.width) * 100;
    let posY = ((clientY - imgRect.top) / imgRect.height) * 100;

    lens.style.backgroundPosition = posX + "% " + posY + "%";
  }
}


/* DESKTOP */
bookSpread.addEventListener("mousemove", e=>{
  updateLens(e.clientX, e.clientY);
});

/* MOBILE */
bookSpread.addEventListener("touchmove", e=>{
  const touch = e.touches[0];
  updateLens(touch.clientX, touch.clientY);
});


/* ================= TOC ================= */

const tocItems = document.querySelectorAll(".toc-item");

tocItems.forEach(item => {

  item.addEventListener("click", () => {

    let pageIndex = parseInt(item.dataset.page);

    popup.style.display = "flex";

    // ✅ FIX: align correctly without breaking your numbering
    current = pageIndex - (pageIndex % 2);

    showPages();

  });

});


/* ================= SWIPE ================= */

let startX = 0;

bookSpread.addEventListener("touchstart", (e)=>{
  startX = e.touches[0].clientX;
});

bookSpread.addEventListener("touchend", (e)=>{
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if(diff > 50) next.click();
  if(diff < -50) prev.click();
});

</script>
</body>
</html>
