<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADOBE AFTER EFFECTS</title>

<style>
a {
  text-decoration: none;
  color: inherit;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
color:white;
background:black;
}


.hero{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:150px 0; 
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
}


.navbar{
position:absolute;
top:30px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 80px;
align-items:center;
z-index:5;
}

.logo{
font-weight:bold;
letter-spacing:2px;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:white;
opacity:.8;
}

.book-btn{
border:1px solid white;
padding:6px 18px;
border-radius:20px;
}


.hero-content{
position:absolute;
top:160px;
left:80px;
z-index:5;
}

.hero-title{
font-size:140px;
font-weight:700;
letter-spacing:10px;
opacity:.35;
}


.hero-book{
position:absolute;
bottom:140px;
right:120px;
background:white;
color:black;
border:none;
padding:10px 50px;
border-radius:5px;
font-size:16px;
cursor:pointer;
z-index:5;
}


.footer{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 80px;
background:black;
}

.footer-links{
display:flex;
gap:25px;
}


.houses{
background:#f3f3f3;
color:#111;
padding:100px 80px;
position:relative;
overflow:hidden;
}
.houses::before{
content:"";
position:absolute;
top:-80px;
left:0;
width:100%;
height:160px;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.8),
rgba(0,0,0,0.4),
rgba(243,243,243,0)
);

filter:blur(20px);
pointer-events:none;
}

.houses-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
max-width:1200px;
margin:auto;
}


.lesson-slider{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
max-width:1400px;
margin:auto;
}

.slides{
width:1000px;
height:600px;
}

.slide{
display:none;
}

.slide.active{
display:block;
}

.house-card{
background:white;
border-radius:12px;
overflow:hidden;
text-align:center;
color:#111;
width:100%;
height:100%;
}

.house-card img{
width:100%;
height:100%;
object-fit:cover;
}


.prev,
.next{
background:#3f7d54;
color:white;
border:none;
font-size:26px;
padding:10px 16px;
cursor:pointer;
border-radius:50%;
}


.house-bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.dots{
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#ccc;
border-radius:50%;
}

.dot.active{
background:#111;
}

.view-btn{
background:#3f7d54;
color:white;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}


.book-dropdown{
position:relative;
}

.book-btn{
border:1px solid white;
padding:6px 18px;
border-radius:20px;
background:transparent;
color:white;
cursor:pointer;
}


.dropdown-content{
display:none;
position:absolute;
top:35px;
right:0;
background:rgba(0,0,0,0.9);
border-radius:8px;
min-width:150px;
overflow:hidden;
}

.dropdown-content a{
display:block;
padding:10px 15px;
text-decoration:none;
color:white;
font-size:14px;
}

.dropdown-content a:hover{
background:rgba(255,255,255,0.15);
}


.dropdown-content {
  display: none;
  position: absolute;
  top: 35px;
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 8px;
  min-width: 150px;
  overflow: hidden;
  z-index: 10; 
}

.footer{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:50px 0;
}

.footer-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

.footer-content{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 80px;
z-index:5;
}

.footer-logo{
font-weight:bold;
letter-spacing:2px;
}

.footer-links{
display:flex;
gap:30px;
}

.footer-links a{
text-decoration:none;
color:white;
opacity:.8;
}
.footer .dropdown-content{
top:auto;
bottom:35px; 
}

.fullscreen-view{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.fullscreen-view img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

.close-full{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}
.full-prev,
.full-next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,0.2);
border:none;
color:white;
font-size:40px;
padding:10px 18px;
cursor:pointer;
border-radius:50%;
}

.full-prev{
left:30px;
}

.full-next{
right:30px;
}

.full-prev:hover,
.full-next:hover{
background:rgba(255,255,255,0.4);
}

.finish-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.finish-box{
background:white;
color:#111;
padding:40px 60px;
border-radius:12px;
text-align:center;
}

.quiz-btn{
display:inline-block;
margin-top:20px;
background:#3f7d54;
color:white;
padding:10px 25px;
text-decoration:none;
border-radius:25px;
font-size:14px;
}
.house-card video{
width:100%;
height:100%;
object-fit:cover;
}

@media (max-width: 1000px){

.navbar{
padding:0 20px;
}

.nav-links{
gap:15px;
font-size:14px;
}

.hero{
padding:120px 0;
}

.hero-content{
left:20px;
top:140px;
}

.hero-title{
font-size:70px;
letter-spacing:6px;
}

.houses{
padding:60px 20px;
}

.lesson-slider{
flex-direction:column;
gap:20px;
}

.slides{
width:100%;
height:400px;
}

.prev,
.next{
font-size:22px;
padding:8px 14px;
}

.full-prev,
.full-next{
font-size:30px;
padding:8px 14px;
}

.close-full{
font-size:30px;
top:20px;
right:20px;
}

.finish-box{
padding:30px 25px;
}

.footer-content,
.footer .navbar{
padding:0 20px;
}

body, html{
overflow-x:hidden;
}

}


@media (max-width: 600px){

.hero-title{
font-size:45px;
letter-spacing:4px;
}

.slides{
height:250px;
}

.prev,
.next{
font-size:18px;
padding:6px 10px;
}

.full-prev,
.full-next{
font-size:24px;
}

.nav-links{
gap:10px;
font-size:12px;
}

.book-btn{
padding:5px 12px;
font-size:12px;
}

.finish-box h2{
font-size:20px;
}

.finish-box p{
font-size:14px;
}

}
</style>
</head>

<script>

const bookButtons = document.querySelectorAll('.book-btn');

bookButtons.forEach(button => {

  const dropdown = button.nextElementSibling;

  button.addEventListener('click', (e) => {
    e.stopPropagation();

    dropdown.style.display =
      dropdown.style.display === 'block' ? 'none' : 'block';
  });

});

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-content').forEach(menu => {
    menu.style.display = 'none';
  });
});
const slidesContainer = document.querySelector(".slides");

for(let i = 1; i <= 21; i++){

  const slide = document.createElement("div");
  slide.classList.add("house-card","slide");

  if(i === 1){
    slide.classList.add("active");
  }

  if(i === 6){
    slide.innerHTML = `
      <video controls>
        <source src="aftereffects/10.mp4" type="video/mp4">
        <source src="aftereffects/12.mp4" type="video/mp4">
        <source src="aftereffects/14.mp4" type="video/mp4">
        <source src="aftereffects/16.mp4" type="video/mp4">
        <source src="aftereffects/18.mp4" type="video/mp4">
        <source src="aftereffects/20.mp4" type="video/mp4">
      </video>
    `;
  } else {
    slide.innerHTML = `<img src="aftereffects/${i}.png">`;
  }

  slidesContainer.appendChild(slide);
}

const slides = document.querySelectorAll(".slide");
const next = document.querySelector(".next");
const prev = document.querySelector(".prev");

let index = 0;

function showSlide(i){
  slides.forEach(slide => slide.classList.remove("active"));
  slides[i].classList.add("active");
}

const finishPopup = document.getElementById("finishPopup");

next.addEventListener("click", () => {

  if(index === slides.length - 1){
    finishPopup.style.display = "flex";
    return;
  }

  index++;
  showSlide(index);

});

prev.addEventListener("click", () => {
  index--;
  if(index < 0){
    index = slides.length - 1;
  }
  showSlide(index);
});

const fullscreenView = document.getElementById("fullscreenView");
const fullscreenImg = document.getElementById("fullscreenImg");
const closeFull = document.querySelector(".close-full");

document.addEventListener("click", function(e){
  if(e.target.closest(".slide img")){
    
    fullscreenImg.src = e.target.src;
    fullscreenView.style.display = "flex";

  }
});

closeFull.addEventListener("click", () => {
  fullscreenView.style.display = "none";
});

fullscreenView.addEventListener("click", (e) => {
  if(e.target === fullscreenView){
    fullscreenView.style.display = "none";
  }
});

const fullNext = document.querySelector(".full-next");
const fullPrev = document.querySelector(".full-prev");

function updateFullscreen(){
  const img = slides[index].querySelector("img");

  if(img){
    fullscreenImg.src = img.src;
  }
}
fullNext.addEventListener("click", (e) => {
  e.stopPropagation();

  if(index === slides.length - 1){
    fullscreenView.style.display = "none";
    finishPopup.style.display = "flex";
    return;
  }

  index++;
  showSlide(index);
  updateFullscreen();
});

fullPrev.addEventListener("click", (e) => {
  e.stopPropagation();

  index--;
  if(index < 0){
    index = slides.length - 1;
  }

  showSlide(index);
  updateFullscreen();
});
</script>
