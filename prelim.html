<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRELIM</title>

<style>
a {
  text-decoration: none;
  color: inherit;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
color:white;
background:black;
}

/* HERO SECTION */

.hero{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:150px 0; /* controls header height */
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
pointer-events:none;
}

/* NAVBAR */

.navbar {
  position: absolute;
  top: 30px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 80px;
  z-index: 1000;
}

.logo{
  font-weight:bold;
  letter-spacing:8px;
  margin-left:20px; /* ✅ match visual spacing */
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
  text-decoration:none;
  font-weight:bold;
  color:white;
  opacity:.8;
  font-size:18px;
  padding:8px 12px; /* 👈 adds space around text */
  transition:0.3s;
}

.nav-links a:hover{
  opacity:1;
}

.nav-book-btn{
  background:white;
  color:black;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
    margin-right:20px;
}

/* HERO CONTENT */

.hero-content{
position:absolute;
top:160px;
left:80px;
z-index:5;
}

.hero-title{
font-size:140px;
font-weight:700;
letter-spacing:10px;
opacity:.35;
}

/* POPULAR HOUSES */

.houses{
background:#f3f3f3;
color:#111;
padding:100px 80px;
position:relative;
overflow:hidden;
}
.houses::before{
content:"";
position:absolute;
top:-80px;
left:0;
width:100%;
height:160px;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.8),
rgba(0,0,0,0.4),
rgba(243,243,243,0)
);

filter:blur(20px);
pointer-events:none;
}

.houses-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
max-width:1200px;
margin:auto;
}

/* FEATURE CARD */

.house-feature{
height:450px;
border-radius:16px;
background:url("bgninabueno.jpg") center/cover no-repeat;
position:relative;
overflow:hidden;
}

.house-feature-info{
position:absolute;
bottom:15px;
left:15px;
color:white;
}

.house-feature-info h3{
font-size:18px;
margin-bottom:4px;
}

/* SMALL CARDS */

.house-list{
display:flex;
flex-direction:column;
gap:20px;
}

.house-card{
background:white;
border-radius:12px;
overflow:hidden;
text-align:center;
color:#111;
text-decoration:none;
display:block;
}

.house-card img{
width:100%;
height:200px;
object-fit:cover;
}

.house-card h3{
padding:15px;
font-size:16px;
}

/* BOTTOM CONTROLS */

.house-bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.dots{
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#ccc;
border-radius:50%;
}

.dot.active{
background:#111;
}

.view-btn{
background:#3f7d54;
color:white;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.footer{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:50px 0;
}

.footer-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

.footer-content{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 80px;
z-index:5;
}

.footer-logo{
font-weight:bold;
letter-spacing:8px;
margin-left:20px; /* adjust this value */
}

.footer-links{
display:flex;
gap:30px;
}

.footer-links a{
  text-decoration:none;
  font-weight:bold;
  color:white;
  opacity:.8;
  font-size:18px;
  padding:8px 12px; /* 👈 adds space around text */
  transition:0.3s;
}

.footer-links a:hover{
  opacity:1;
}

.navbar,
.footer-content {
  padding: 0 80px;
}


/* BOOK DROPDOWN */

.book-dropdown{
position:relative;
}

.nav-book-btn{
   background:white;
  color:black;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
    margin-right:20px;

}

.book-dropdown button:focus{
  outline:none;
}

/* Dropdown menu */

.dropdown-content{
display:none;
position:absolute;
top:35px;
right:0;
background:rgba(0,0,0,0.9);
border-radius:8px;
min-width:150px;
overflow:hidden;
}

.dropdown-content a{
display:block;
padding:10px 15px;
text-decoration:none;
color:white;
font-size:14px;
}

.dropdown-content a:hover{
background:rgba(255,255,255,0.15);
}

/* Show dropdown */

.dropdown-content{
  display: none;
  position: absolute;
  top: 100%;         /* always below button */
  margin-top: 10px;  /* space between button & dropdown */
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 8px;
  min-width: 150px;
  overflow: hidden;
  z-index: 10;
}
.footer .dropdown-content{
  top: auto;            /* remove downward behavior */
  bottom: 100%;         /* 👈 attach to top of button */
  margin-bottom: 10px;  /* 👈 spacing from button */
}
.footer .nav-book-btn{
  margin-right:20px;
}

/* ========================= */
/* 📱 RESPONSIVE FIX (PRELIM) */
/* ========================= */

@media (max-width: 1000px){

/* NAVBAR stays horizontal */
.navbar{
padding:0 20px;
}

.nav-links{
gap:15px;
font-size:14px;
}

/* HERO FIX */
.hero{
padding:120px 0;
}

/* HERO TITLE SCALE */
.hero-content{
left:20px;
top:140px;
}

.hero-title{
font-size:70px;
letter-spacing:6px;
}

/* GRID → 2 COLUMNS */
.houses-container{
grid-template-columns:1fr 1fr;
gap:20px;
padding:0 10px;
}

/* IMAGE FIX */
.house-card img{
height:180px;
}

/* SECTION PADDING */
.houses{
padding:70px 20px;
}

/* FOOTER FIX */
.footer-content,
.footer .navbar{
padding:0 20px;
}

/* PREVENT SIDE SCROLL */
body, html{
overflow-x:hidden;
}

}
@media (max-width: 900px) {

  /* NAVBAR */
  .navbar {
    padding: 0 15px;
    gap: 10px;
  }

  .logo {
    font-size: 14px;
    letter-spacing: 3px;
    margin-left: 0;
    flex-shrink: 0;
  }

  .nav-links {
    gap: 12px;
  }

  .nav-links a {
    font-size: 14px;
    padding: 6px 8px;
  }

  .nav-book-btn {
    padding: 8px 16px;
    font-size: 14px;
	margin-right: 5px;
    flex-shrink: 0;
  }

  /* dropdown centered */
  .dropdown-content {
    right: 0;
    transform: translateX(-10px);
  }

  /* FOOTER */
   .footer-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    gap: 10px;
  }

  .footer-logo {
    font-size: 14px;
    white-space: nowrap; /* 🔥 prevent breaking */
    flex-shrink: 0;
	margin-right: 10px;
  }

  .footer-links {
    display: flex;
    gap: 10px;
  }

  .footer-links a {
    font-size: 13px;
    padding: 5px 6px;
    white-space: nowrap; /* 🔥 FIX TEXT BREAK */
  }

  .book-dropdown {
    flex-shrink: 0; /* 🔥 prevent squish */
  }

  .nav-book-btn {
    padding: 8px 16px;
    font-size: 14px;
    margin-right: 10px;
	flex-shrink: 0;
    white-space: nowrap;
  }

  /* DROPDOWN FULL WIDTH STYLE */
  .dropdown-content {
    min-width: 120px;
    font-size: 13px;
  }
}
/* MOBILE */
@media (max-width: 600px){

/* HERO TITLE SMALL */
.hero-title{
font-size:45px;
letter-spacing:4px;
}

/* GRID → 1 COLUMN */
.houses-container{
grid-template-columns:1fr;
}

/* CARD IMPROVE */
.house-card img{
height:200px;
}

/* NAVBAR TIGHT */
.nav-links{
gap:10px;
font-size:12px;
}

.book-btn{
padding:5px 12px;
font-size:12px;
}
/* KEEP EVERYTHING IN ONE LINE */
/* FORCE SAME STRUCTURE AS FOOTER */
.navbar{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
  gap: 5px;
}

/* GROUP CENTER LINKS */
.nav-links{
  display: flex;
  align-items: center;
  gap: 5px;
}

/* LOGO SAME BEHAVIOR */
.logo{
  font-size: 12px;
  letter-spacing: 2px;
  margin: 0;
  flex-shrink: 0;
  white-space: nowrap;
}

/* LINKS SAME AS FOOTER */
.nav-links a{
  font-size: 11px;
  padding: 4px 5px;
  white-space: nowrap;
}

/* BOOK BUTTON SAME POSITION */
.book-dropdown{
  flex-shrink: 0;
}

.nav-book-btn{
  font-size: 11px;
  padding: 5px 10px;
  margin: 0;
  white-space: nowrap;
}
.navbar,
.footer-content{
  padding: 0 10px;
}
/* FOOTER SAME STYLE */
.footer-content{
  padding: 0 10px;
}

.footer-logo{
  font-size: 12px;
  letter-spacing: 2px;
}

.footer-links{
  gap: 5px;
}

.footer-links a{
  font-size: 11px;
  padding: 4px 5px;
}

.footer .nav-book-btn{
  font-size: 11px;
  padding: 5px 10px;
}
.nav-links a,
.footer-links a{
  white-space: nowrap;
}


}


</style>
</head>


<body>


<!-- HERO -->
<div class="hero">

<div class="overlay"></div>

</div>

<!-- POPULAR HOUSES -->

<div class="navbar">

</div>

<div class="nav-links">

<div class="book-dropdown">
  <button class="nav-book-btn">Book</button>
  <div class="dropdown-content">
    <a href="lessons.html">Lesson</a>

</div>


</body>
<script>
const bookButtons = document.querySelectorAll('.nav-book-btn');

bookButtons.forEach(button => {

  const dropdown = button.nextElementSibling;

  button.addEventListener('click', (e) => {
    e.stopPropagation();

    // close all other dropdowns first
    document.querySelectorAll('.dropdown-content').forEach(menu => {
      if(menu !== dropdown){
        menu.style.display = 'none';
      }
    });

    // toggle current
    dropdown.style.display =
      dropdown.style.display === 'block' ? 'none' : 'block';
  });

});
/* CLOSE ONLY WHEN CLICK OUTSIDE */
document.addEventListener('click', (e) => {

  if(!e.target.closest('.book-dropdown')){
    document.querySelectorAll('.dropdown-content').forEach(menu => {
      menu.style.display = 'none';
    });
  }

});
</script>
</html>
