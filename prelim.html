<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRELIM</title>

<style>
a {
  text-decoration: none;
  color: inherit;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
color:white;
background:black;
}

/* HERO SECTION */

.hero{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:150px 0; /* controls header height */
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
pointer-events:none;
}

/* NAVBAR */

.navbar{
position:absolute;
top:30px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 80px;
align-items:center;
z-index:5;
}

.logo{
font-weight:bold;
letter-spacing:2px;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:white;
opacity:.8;
}

.book-btn{
border:1px solid white;
padding:6px 18px;
border-radius:20px;
}

/* HERO CONTENT */

.hero-content{
position:absolute;
top:160px;
left:80px;
z-index:5;
}

.hero-title{
font-size:140px;
font-weight:700;
letter-spacing:10px;
opacity:.35;
}

/* BOOK BUTTON */

.hero-book{
position:absolute;
bottom:140px;
right:120px;
background:white;
color:black;
border:none;
padding:10px 50px;
border-radius:5px;
font-size:16px;
cursor:pointer;
z-index:5;
}

/* FOOTER */

.footer{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 80px;
background:black;
}

.footer-links{
display:flex;
gap:25px;
}

/* POPULAR HOUSES */

.houses{
background:#f3f3f3;
color:#111;
padding:100px 80px;
position:relative;
overflow:hidden;
}
.houses::before{
content:"";
position:absolute;
top:-80px;
left:0;
width:100%;
height:160px;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.8),
rgba(0,0,0,0.4),
rgba(243,243,243,0)
);

filter:blur(20px);
pointer-events:none;
}

.houses-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
max-width:1200px;
margin:auto;
}

/* FEATURE CARD */

.house-feature{
height:450px;
border-radius:16px;
background:url("bgninabueno.jpg") center/cover no-repeat;
position:relative;
overflow:hidden;
}

.house-feature-info{
position:absolute;
bottom:15px;
left:15px;
color:white;
}

.house-feature-info h3{
font-size:18px;
margin-bottom:4px;
}

/* SMALL CARDS */

.house-list{
display:flex;
flex-direction:column;
gap:20px;
}

.house-card{
background:white;
border-radius:12px;
overflow:hidden;
text-align:center;
color:#111;
text-decoration:none;
display:block;
}

.house-card img{
width:100%;
height:200px;
object-fit:cover;
}

.house-card h3{
padding:15px;
font-size:16px;
}

/* BOTTOM CONTROLS */

.house-bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.dots{
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#ccc;
border-radius:50%;
}

.dot.active{
background:#111;
}

.view-btn{
background:#3f7d54;
color:white;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* BOOK DROPDOWN */

.book-dropdown{
position:relative;
}

.book-btn{
border:1px solid white;
padding:6px 18px;
border-radius:20px;
background:transparent;
color:white;
cursor:pointer;
}

/* Dropdown menu */

.dropdown-content{
display:none;
position:absolute;
top:35px;
right:0;
background:rgba(0,0,0,0.9);
border-radius:8px;
min-width:150px;
overflow:hidden;
}

.dropdown-content a{
display:block;
padding:10px 15px;
text-decoration:none;
color:white;
font-size:14px;
}

.dropdown-content a:hover{
background:rgba(255,255,255,0.15);
}

/* Show dropdown */

.dropdown-content {
  display: none;
  position: absolute;
  top: 35px;
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 8px;
  min-width: 150px;
  overflow: hidden;
  z-index: 10; /* ensure it’s on top */
}
/* FOOTER SECTION */

.footer{
background:url("lol.jpg") center/cover no-repeat;
position:relative;
padding:50px 0;
}

.footer-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

.footer-content{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 80px;
z-index:5;
}

.footer-logo{
font-weight:bold;
letter-spacing:2px;
}

.footer-links{
display:flex;
gap:30px;
}

.footer-links a{
text-decoration:none;
color:white;
opacity:.8;
}
.footer .dropdown-content{
top:auto;
bottom:35px; /* opens upward */
}

/* ========================= */
/* 📱 RESPONSIVE FIX (PRELIM) */
/* ========================= */

@media (max-width: 1000px){

/* NAVBAR stays horizontal */
.navbar{
padding:0 20px;
}

.nav-links{
gap:15px;
font-size:14px;
}

/* HERO FIX */
.hero{
padding:120px 0;
}

/* HERO TITLE SCALE */
.hero-content{
left:20px;
top:140px;
}

.hero-title{
font-size:70px;
letter-spacing:6px;
}

/* GRID → 2 COLUMNS */
.houses-container{
grid-template-columns:1fr 1fr;
gap:20px;
padding:0 10px;
}

/* IMAGE FIX */
.house-card img{
height:180px;
}

/* SECTION PADDING */
.houses{
padding:70px 20px;
}

/* FOOTER FIX */
.footer-content,
.footer .navbar{
padding:0 20px;
}

/* PREVENT SIDE SCROLL */
body, html{
overflow-x:hidden;
}

}


/* MOBILE */
@media (max-width: 600px){

/* HERO TITLE SMALL */
.hero-title{
font-size:45px;
letter-spacing:4px;
}

/* GRID → 1 COLUMN */
.houses-container{
grid-template-columns:1fr;
}

/* CARD IMPROVE */
.house-card img{
height:200px;
}

/* NAVBAR TIGHT */
.nav-links{
gap:10px;
font-size:12px;
}

.book-btn{
padding:5px 12px;
font-size:12px;
}

}


</style>
</head>


<body>


<!-- HERO -->
<div class="hero">

<div class="overlay"></div>

<a href="index.html">
<div class="navbar">
<div class="logo">GTECH</div>
</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="aboutus.html">About Us</a>
<a href="manual.html">Manual</a>
</div>

<div class="book-dropdown">
  <button class="book-btn">Book</button>
  <div class="dropdown-content">
    <a href="lessons.html">Lesson</a>
    <a href="infog.html">Infographics</a>
  </div>
</div>

</div>
</div>
<div class="hero-content">
<div class="hero-title">PRELIM</div>
</div>


<!-- POPULAR HOUSES -->
<section class="houses">

<div class="houses-container">

<a href="multimedia.html" class="house-card">
    <img src="lessons/MM.png">
    <h3>Multimedia</h3>
</a>

<a href="colortheory.html" class="house-card">
    <img src="lessons/colorr.png">
    <h3>Color Theory</h3>
</a>

<a href="basicphotog.html" class="house-card">
    <img src="lessons/BP.png">
    <h3>Basic Photography</h3>
</a>

<a href="adobephoto.html" class="house-card">
    <img src="lessons/AP.png">
    <h3>Adobe Photoshop</h3>
</a>

</div>


</section>


<!-- FOOTER -->
<div class="footer">

<div class="footer-overlay"></div>

<div class="navbar">

<a href="index.html">
<div class="logo">GTECH
</div>
</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="aboutus.html">About Us</a>
<a href="manual.html">Manual</a>
</div>

<div class="book-dropdown">
  <button class="book-btn">Book</button>
  <div class="dropdown-content">
    <a href="lessons.html">Lesson</a>
    <a href="infog.html">Infographics</a>
  </div>
</div>
</div>

</div>


</body>
<script>
const bookButtons = document.querySelectorAll('.book-btn');

bookButtons.forEach(button => {

  const dropdown = button.nextElementSibling;

  button.addEventListener('click', (e) => {
    e.stopPropagation();

    dropdown.style.display =
      dropdown.style.display === 'block' ? 'none' : 'block';
  });

});

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-content').forEach(menu => {
    menu.style.display = 'none';
  });
});
</script>
</html>
