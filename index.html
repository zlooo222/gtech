<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP QUIZ 2</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>

a { text-decoration:none; color:inherit; }
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }

:root{
  --dark:#0B1F33; --deep:#1C2E4A; --blue:#26425A; --lightblue:#86A8CF;
  --pink:#C38EB4; --soft:#E1CBD7; --text:#ffffff;
}

body{
  color: var(--text);
  background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8)),
              url("IMG.png") no-repeat center center fixed;
  background-size: cover;
  min-height:100vh;
  transition:0.4s ease;
}

.navbar{
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  width:90%; padding:15px 25px; border-radius:20px;
  background:rgba(255,255,255,0.05); backdrop-filter: blur(25px) saturate(180%);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  display:flex; justify-content:space-between; align-items:center; z-index:100;
}
.nav-actions{ display:flex; gap:10px; }
.logo{ font-weight:700; letter-spacing:6px; font-size:18px; }
.menu-btn{ font-size:26px; cursor:pointer; padding:8px 12px; border-radius:10px; transition:0.3s; }
.menu-btn:hover{ background:rgba(255,255,255,0.15); }
.menu-panel{
  position:absolute; top:75px; right:20px; width:260px; padding:20px; border-radius:20px;
  background: rgba(20,25,35,0.9); backdrop-filter: blur(25px) saturate(160%);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 25px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.15);
  display:flex; flex-direction:column; gap:12px;
  opacity:0; transform:translateY(-10px) scale(0.95); pointer-events:none; transition: all 0.3s ease;
}
.menu-panel.active{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
.menu-panel a, .menu-panel button{
  padding:14px; border-radius:12px; background:transparent; border:none;
  color:rgba(255,255,255,0.9); font-size:16px; text-align:left; transition:0.25s; cursor:pointer;
}
.menu-panel a:hover, .menu-panel button:hover{
  background:rgba(255,255,255,0.12); transform:translateX(5px);
}

.game-wrapper-theme {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 10rem 2rem 5rem 2rem;
  min-height: 100vh;
  box-sizing: border-box;
}

.game-wrapper {
  background: rgba(255, 205, 225, 0.92);   
  color: #000000; 
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border-radius: 30px;
  padding: 2rem;
  text-align: center;
  font-family: Arial, sans-serif;
  width:100%;
  max-width:500px;
}

.game-wrapper h1 {
  color: #C2185B; 
  margin-bottom: 1rem;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

.game-wrapper input,
.game-wrapper select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 15px;
  border: 1px solid #AEE0FF; 
  background: #FFFFFF;
  color: #000000;
}

.game-wrapper button {
  cursor: pointer;
  border-radius: 15px;
  padding: 10px 15px;
  margin: 5px 0;
  border: none;
  transition: 0.3s;
  font-weight: bold;
}

#startScreen button {
  background: #F48FB1;
  color: #FFFFFF;
}

#startScreen button:hover {
  background: #EC407A;
}

/* TEXT TO SPEECH BUTTONS - PINK */
#speakBtn,
#pauseBtn {
  background: #F48FB1; 
  color: #FFFFFF;      
  border-radius: 15px;
  padding: 10px 20px;
  font-weight: bold;
  margin: 5px;
  border: 2px solid #EC407A;
  box-shadow: 0 4px 10px rgba(194, 24, 91, 0.25);
}

#speakBtn:hover,
#pauseBtn:hover {
  background: #EC407A; 
  color: #FFFFFF;
}

.activeBtn {
  background: #C2185B !important; 
  color: #FFFFFF !important;
  transform: scale(1.05);
}

#quitBtn {
  background: #FFFFFF !important;
  color: #C2185B !important;
  border: 2px solid #EC407A !important;
  padding: 6px 12px !important;    
  font-size: 0.9rem !important;    
  border-radius: 10px !important;  
  width: auto !important;          
  display: inline-block !important;
  margin: 10px 0 0 0 !important;
}
#quitBtn:hover {
  background: #F8BBD0 !important;
}

#feedback {
  margin-top: 1rem;
  font-weight: bold;
  font-size: 1.2rem;
}

#feedback.correct {
  background: #90EE90; 
  color: #000000;
  padding: 10px;
  border-radius: 12px;
}

#feedback.wrong {
  background: #FF7F7F; 
  color: #000000;
  padding: 10px;
  border-radius: 12px;
}

/* TIMER AT THE TOP */
#timer {
  margin: 0 0 15px 0;
  font-weight: bold;
  color: #FFFFFF;
  background: #C2185B;
  padding: 10px 18px;
  border-radius: 20px;
  display: inline-block;
  font-size: 1.2rem;
  box-shadow: 0 4px 10px rgba(194, 24, 91, 0.3);
}

#timer.hidden {
  display: none !important;
}

#leaderboard div {
  background: #BFEFFF;
  color: #000000;
  padding: 0.5rem;
  border-radius: 10px;
  margin-top: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.drag-instruction {
  background: #F8BBD0;
  color: #880E4F;
  padding: 12px;
  border-radius: 18px;
  font-weight: bold;
  margin-bottom: 12px;
  border: 2px dashed #EC407A;
  box-shadow: 0 4px 10px rgba(194, 24, 91, 0.25);
}

.choices-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 15px;
}

.draggable-choice {
  background: #F06292;
  color: #ffffff;
  padding: 13px;
  border-radius: 15px;
  font-weight: bold;
  cursor: grab;
  user-select: none;
  touch-action: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.2s ease;
}

.draggable-choice:hover {
  background: #EC407A;
  transform: scale(1.02);
}

.draggable-choice.dragging {
  opacity: 0.6;
  transform: scale(1.05);
}

.drop-zone {
  min-height: 90px;
  border: 3px dashed #C2185B;
  border-radius: 20px;
  background: #FFF0F6;
  color: #880E4F;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
  margin-top: 15px;
  transition: 0.25s;
}

.drop-zone.drag-over {
  background: #F8BBD0;  
  transform: scale(1.03);
}

@media (max-width: 760px) {
  .menu-panel{
    width:200px;
    right:10px;
    top:65px;
  }
  font-size: 1rem;
    padding: 14px;
  }

  button {
    font-size: 1rem;
    padding: 12px;
  }
  .game-wrapper-theme {
    padding: 8rem 1rem 3rem 1rem;
  }

  .game-wrapper {
    padding: 1.3rem;
    border-radius: 22px;
  }

  .game-wrapper h1 {
    font-size: 1.6rem;
  }

  .draggable-choice {
    font-size: 0.9rem;
    padding: 12px;
  }

  .drop-zone {
    min-height: 80px;
    font-size: 0.9rem;
  }

  #timer {
    font-size: 1rem;
    padding: 8px 15px;
  }
}
.draggable-choice {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.draggable-choice.dragging {
  transform: scale(1.08);
  box-shadow: 0 12px 25px rgba(0,0,0,0.3);
  cursor: grabbing;
}
.drop-zone.drag-over {
  background: #F8BBD0;
  transform: scale(1.05);
}
body {
  touch-action: none;
}
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html" class="logo">GTECH</a>
  <div class="nav-actions">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="menu-panel" id="menuPanel">
   <a href="index.html">Home</a>
	<a href="aboutus.html">About Us</a>
	<a href="intro.html">Introduction</a>
    <a href="lessons.html">Lessons</a>
    <a href="infog.html">Infographic</a>
    <a href="manual.html">Manual</a>
    <a href="contactus.html">Contact Us</a>
  </div>
</div>

<div class="game-wrapper-theme">
  <div class="game-wrapper">
    <h1> Drag and Drop in Adobe Photoshop</h1>

    <div id="startScreen">
      <p id="nameWarning" class="text-red-600 text-sm hidden mt-1">⚠️ Please enter your name!</p>
      <input id="playerName" placeholder="Enter your name"/>
      <p class="mb-2 font-semibold">Choose difficulty:</p>
      <select id="difficulty">
        <option value="15">Easy (15s)</option>
        <option value="10">Medium (10s)</option>
        <option value="5">Hard (5s)</option>
      </select>
      <button id="startBtn">Start Quiz</button>
    </div>

    <div id="speechControls" class="mt-3 flex justify-center gap-2 hidden">
      <button id="speakBtn">▶️ Speak</button>
      <button id="pauseBtn">⏸ Pause</button>
    </div>

    <div id="timer" class="hidden"></div>
    <div id="quiz" class="hidden"></div>
    <div id="feedback"></div>
    <div id="leaderboard" class="hidden"></div>

    <audio id="correctSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg"></audio>
    <audio id="wrongSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg"></audio>
  </div>
</div>

<script>

function toggleMenu(){
  const menu = document.getElementById("menuPanel");
  menu.classList.toggle("active");
}

document.addEventListener("click", function(e){
  const menu = document.getElementById("menuPanel");
  const btn = document.querySelector(".menu-btn");

  if(menu && btn){
    if(!menu.contains(e.target) && !btn.contains(e.target)){
      menu.classList.remove("active");
    }
  }
});

const speakBtn = document.getElementById("speakBtn");
const pauseBtn = document.getElementById("pauseBtn");

const questions = [
  {
    q: "What is the primary purpose of Adobe Photoshop?",
    choices: [
      "To create only vector-based illustrations",
      "To edit and manipulate digital images",
      "To design 3D animations exclusively",
      "To manage database systems"
    ],
    answer: 1
  },
  {
    q: "When was Adobe Photoshop first developed?",
    choices: [
      "1985–1986",
      "1987–1988",
      "1989–1990",
      "1991–1992"
    ],
    answer: 1
  },
  {
    q: "Why did John Knoll support the development of Photoshop?",
    choices: [
      "He wanted to replace traditional photography",
      "He recognized its potential in image processing",
      "He needed software for coding systems",
      "He aimed to create gaming applications"
    ],
    answer: 1
  },
  {
    q: "How does the Move Tool function in Photoshop?",
    choices: [
      "It deletes selected layers permanently",
      "It resizes images automatically",
      "It moves layers, selections, and guides",
      "It converts images into vectors"
    ],
    answer: 2
  },
  {
    q: "What happens when “Auto-Select” is enabled in the Move Tool?",
    choices: [
      "It locks the selected layer",
      "It automatically selects the clicked layer or group",
      "It duplicates the selected object",
      "It hides unselected layers"
    ],
    answer: 1
  },
  {
    q: "What is the main function of the Marquee Tool?",
    choices: [
      "To paint images",
      "To create selections",
      "To erase layers",
      "To zoom images"
    ],
    answer: 1
  },
  {
    q: "How does the Rectangular Marquee Tool differ from the Elliptical Marquee Tool?",
    choices: [
      "One selects circles, the other selects freehand shapes",
      "One selects rectangles, the other selects ovals",
      "One edits images, the other deletes images",
      "One zooms, the other crops"
    ],
    answer: 1
  },
  {
    q: "Why would a user choose the Magnetic Lasso Tool?",
    choices: [
      "To erase pixels quickly",
      "To select objects by snapping to edges",
      "To paint smooth lines",
      "To create text boxes"
    ],
    answer: 1
  },
  {
    q: "How does the Quick Selection Tool select objects?",
    choices: [
      "By typing coordinates",
      "By painting over the object with a brush",
      "By drawing straight lines only",
      "By selecting entire layers automatically"
    ],
    answer: 1
  },
  {
    q: "What is the advantage of unchecking “Delete Cropped Pixels” in the Crop Tool?",
    choices: [
      "It permanently deletes unwanted areas",
      "It allows non-destructive cropping",
      "It converts images to grayscale",
      "It increases image resolution"
    ],
    answer: 1
  }
];

let shuffled, index, score, results, timeLeft, timer, timePerQ, playerName;
let audioUnlocked = false;
let speech = window.speechSynthesis, utterance, paused = false;
let selectedDraggedAnswer = null;
let alreadyAnswered = false;

function shuffleChoices(questions) {
  return questions.map(q => {
    const choices = [...q.choices];
    const correctAnswerText = choices[q.answer];

    for (let i = choices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [choices[i], choices[j]] = [choices[j], choices[i]];
    }

    const newAnswerIndex = choices.indexOf(correctAnswerText);
    return { q: q.q, choices: choices, answer: newAnswerIndex };
  });
}

document.getElementById("startBtn").addEventListener("click", () => {
  const inputName = document.getElementById("playerName").value.trim();
  const warning = document.getElementById("nameWarning");

  if (inputName === "") { 
    warning.classList.remove("hidden"); 
    return; 
  }

  warning.classList.add("hidden");
  playerName = inputName;

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  document.getElementById("speechControls").classList.remove("hidden");
  document.getElementById("timer").classList.remove("hidden");

  timePerQ = parseInt(document.getElementById("difficulty").value);

  shuffled = shuffleChoices([...questions]).sort(() => Math.random() - 0.5);

  index = 0; 
  score = 0; 
  results = [];
  unlockAudio();
  showQuestion();
});

function unlockAudio(){
 if(audioUnlocked) return;

 [document.getElementById("correctSound"), document.getElementById("wrongSound")].forEach(a => {
   a.muted = true; 
   a.play().then(() => { 
    a.pause(); 
    a.currentTime = 0; 
    a.muted = false; 
   }).catch(()=>{});
 });

 audioUnlocked = true;
}

function showQuestion() {
  const feedbackEl = document.getElementById("feedback");
  feedbackEl.innerText = "";
  feedbackEl.className = "";
  alreadyAnswered = false;
  selectedDraggedAnswer = null;

  if (index >= shuffled.length) { 
    showResults(); 
    return; 
  }

  const q = shuffled[index];

  let html = `
    <h2 class='text-xl mb-3 text-white'>${q.q}</h2>
    <div class="drag-instruction">Drag the correct answer and drop it inside the box below.</div>

    <div 
      id="dropZone" 
      class="drop-zone"
      ondragover="allowDrop(event)"
      ondragenter="dragEnter(event)"
      ondragleave="dragLeave(event)"
      ondrop="dropAnswer(event)"
    >
      Drop your answer here
    </div>

    <div class="choices-area">
  `;

  q.choices.forEach((c, i) => {
    html += `
    <div 
  class="draggable-choice" 
  data-answer="${i}"
  onpointerdown="startDrag(event)"
>
  ${c}
</div>
    `;
  });

  html += `
    </div>
    <button id="quitBtn" onclick="quitGame()">Quit Game</button>
  `;

  document.getElementById("quiz").innerHTML = html;
  startTimer();

  const quitBtn = document.getElementById("quitBtn");
  quitBtn.addEventListener("click", () => {
    quitBtn.style.background = "#6D2932";
    quitBtn.style.color = "white";
    setTimeout(() => {
      quitBtn.style.background = "#C7B7A3";
      quitBtn.style.color = "#561C24";
    }, 200);
  });
}

let draggedEl = null;
let offsetX = 0;
let offsetY = 0;

function startDrag(e){
  if (alreadyAnswered) return;

  draggedEl = e.target;

  const rect = draggedEl.getBoundingClientRect();

  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  draggedEl.style.position = "fixed";
  draggedEl.style.zIndex = "9999";
  draggedEl.style.width = rect.width + "px";
  draggedEl.classList.add("dragging");

  moveAt(e.clientX, e.clientY);

  document.addEventListener("pointermove", onMove);
  document.addEventListener("pointerup", endDrag);
}

function moveAt(x, y){
  if (!draggedEl) return;

  draggedEl.style.left = (x - offsetX) + "px";
  draggedEl.style.top = (y - offsetY) + "px";
}

function onMove(e){
  moveAt(e.clientX, e.clientY);

  const dropZone = document.getElementById("dropZone");
  const rect = dropZone.getBoundingClientRect();

  if (
    e.clientX >= rect.left &&
    e.clientX <= rect.right &&
    e.clientY >= rect.top &&
    e.clientY <= rect.bottom
  ) {
    dropZone.classList.add("drag-over");
  } else {
    dropZone.classList.remove("drag-over");
  }
}

function endDrag(e){
  if (!draggedEl) return;

  const dropZone = document.getElementById("dropZone");
  const rect = dropZone.getBoundingClientRect();

  // SNAP CHECK
  if (
    e.clientX >= rect.left &&
    e.clientX <= rect.right &&
    e.clientY >= rect.top &&
    e.clientY <= rect.bottom
  ) {
    const answerIndex = parseInt(draggedEl.getAttribute("data-answer"));

    // snap animation
    draggedEl.style.transition = "0.2s";
    draggedEl.style.left = rect.left + "px";
    draggedEl.style.top = rect.top + "px";

    setTimeout(() => {
      answer(answerIndex);
    }, 200);

  } else {
    // return to original
    draggedEl.style.transition = "0.3s";
    draggedEl.style.position = "";
    draggedEl.style.left = "";
    draggedEl.style.top = "";
  }

  draggedEl.classList.remove("dragging");

  document.removeEventListener("pointermove", onMove);
  document.removeEventListener("pointerup", endDrag);

  draggedEl = null;
}
function selectAnswer(choice){
  if (alreadyAnswered) return;

  const allChoices = document.querySelectorAll(".draggable-choice");

  // highlight selected
  allChoices.forEach(c => c.style.opacity = "0.6");
  allChoices[choice].style.opacity = "1";
  allChoices[choice].style.transform = "scale(1.05)";

  answer(choice);
}
function dragStart(event) {
  if (alreadyAnswered) return;
  selectedDraggedAnswer = event.target.getAttribute("data-answer");
  event.dataTransfer.setData("text/plain", selectedDraggedAnswer);
  event.target.classList.add("dragging");
}

function dragEnd(event) {
  event.target.classList.remove("dragging");
}

function allowDrop(event) {
  event.preventDefault();
}

function dragEnter(event) {
  event.preventDefault();
  document.getElementById("dropZone").classList.add("drag-over");
}

function dragLeave(event) {
  document.getElementById("dropZone").classList.remove("drag-over");
}

function dropAnswer(event) {
  event.preventDefault();

  if (alreadyAnswered) return;

  document.getElementById("dropZone").classList.remove("drag-over");

  let choice = event.dataTransfer.getData("text/plain");

  if (choice === "" || choice === null) {
    choice = selectedDraggedAnswer;
  }

  if (choice !== null && choice !== "") {
    answer(parseInt(choice));
  }
}

function pointerStart(event) {
  if (alreadyAnswered) return;
  selectedDraggedAnswer = event.currentTarget.getAttribute("data-answer");
  event.currentTarget.classList.add("dragging");
}

function pointerEnd(event) {
  if (alreadyAnswered) return;

  event.currentTarget.classList.remove("dragging");

  const dropZone = document.getElementById("dropZone");
  const rect = dropZone.getBoundingClientRect();

  const x = event.clientX;
  const y = event.clientY;

  if (
    x >= rect.left &&
    x <= rect.right &&
    y >= rect.top &&
    y <= rect.bottom
  ) {
    answer(parseInt(selectedDraggedAnswer));
  }
}

function answer(choice){ 
  if (alreadyAnswered) return;

  alreadyAnswered = true;
  clearInterval(timer); 
  speech.cancel(); 
  paused = false;
  recordAnswer(choice); 
}

function recordAnswer(choice){
 let correct = shuffled[index].answer;
 let isCorrect = choice === correct;
 const feedbackEl = document.getElementById("feedback");

 if(navigator.vibrate){ 
  if(isCorrect){
    navigator.vibrate(100);
  } else {
    navigator.vibrate([200,100,200]);
  } 
 }

 if(isCorrect){
   playSound("correctSound"); 
   feedbackEl.innerHTML = "✅ CORRECT!"; 
   feedbackEl.className = "mt-4 p-4 text-2xl rounded-xl font-extrabold bg-green-500 text-white shadow-lg"; 
   score++;
 } else {
   playSound("wrongSound"); 
   feedbackEl.innerHTML = "❌ WRONG!"; 
   feedbackEl.className = "mt-4 p-4 text-2xl rounded-xl font-extrabold bg-red-500 text-white shadow-lg";
 }

 results.push({
  question: shuffled[index].q,
  userAnswer: choice === -1 ? "No answer" : shuffled[index].choices[choice],
  correctAnswer: shuffled[index].choices[correct],
  isCorrect
 });

 setTimeout(()=>{
  index++; 
  showQuestion();
 },1000);
}

function startTimer(){
 timeLeft = timePerQ;
 document.getElementById("timer").innerText = "⏳ " + timeLeft;

 timer = setInterval(() => {
   timeLeft--;
   document.getElementById("timer").innerText = "⏳ " + timeLeft;

   if(timeLeft <= 0){ 
     clearInterval(timer); 
     speech.cancel(); 
     paused = false;
     alreadyAnswered = true;
     recordAnswer(-1); 
   }
 }, 1000);
}

function quitGame() {
  clearInterval(timer);
  speech.cancel();

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
  document.getElementById("speechControls").classList.add("hidden");
  document.getElementById("timer").classList.add("hidden");
  document.getElementById("timer").innerText = "";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("leaderboard").classList.add("hidden");

  document.getElementById("playerName").value = "";
  document.getElementById("nameWarning").classList.add("hidden");

  shuffled = [];
  index = 0;
  score = 0;
  results = [];
  timeLeft = 0;
  alreadyAnswered = false;
  selectedDraggedAnswer = null;

  console.log("Quit button clicked");
}

function speak(text){
  speech.cancel();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 1;
  utterance.pitch = 1;
  speech.speak(utterance);
}

function startSpeech(){ 
  if(paused){
    speech.resume();
    paused = false;
  } else {
    readCurrentQuestion();
  } 
}

function pauseSpeech(){ 
  speech.pause(); 
  paused = true; 
}

function readCurrentQuestion(){ 
  let q = shuffled[index]; 
  if(!q) return; 

  let text = q.q + ". "; 
  q.choices.forEach((c,i)=>{
    text += `Option ${i+1}: ${c}. `;
  }); 

  speak(text); 
}

function playSound(id){ 
  let audio = document.getElementById(id); 
  if(!audio) return; 

  audio.pause(); 
  audio.currentTime = 0; 
  audio.play().catch(()=>{}); 
}

speakBtn.addEventListener("click", () => {
  speakBtn.classList.add("activeBtn");       
  pauseBtn.classList.remove("activeBtn");    

  setTimeout(() => {
    startSpeech();
  }, 50);
});

pauseBtn.addEventListener("click", () => {
  pauseBtn.classList.add("activeBtn");       
  speakBtn.classList.remove("activeBtn");    

  setTimeout(() => {
    pauseSpeech();
  }, 50);
});

function showResults() {
  clearInterval(timer);
  speech.cancel();

  document.getElementById("quiz").classList.remove("hidden");
  document.getElementById("speechControls").classList.add("hidden");

  document.getElementById("timer").classList.add("hidden");
  document.getElementById("feedback").innerHTML = "";

  saveScore();

  let html = `<h2 class="text-2xl font-bold mb-2">Quiz Finished! 🎉</h2>`;

  const scores = JSON.parse(localStorage.getItem("leaderboard")) || [];
  if (scores.length > 0) {
    html += `<h3 class="text-xl font-semibold mb-2">🏆 Leaderboard</h3>`;
    scores.forEach((s, i) => {
      html += `<div class="mb-1 p-2 rounded-xl text-white shadow-md" style="background:#26425A">
        <strong>${i + 1}. ${s.name}</strong>: ${s.score} pts
      </div>`;
    });
  }

  html += `<p class="font-bold text-lg mt-4 mb-4">Your score: ${score}/${shuffled.length}</p>`;
  html += `<h3 class="font-semibold mb-2">Question Results:</h3>`;

  results.forEach((r, i) => {
    const color = r.isCorrect ? "#6D2932" : "#C38EB4";
    html += `<div class="mb-2 p-3 rounded-xl text-white shadow-md" style="background:${color}">
      <strong>Q${i + 1}:</strong> ${r.question}<br>
      <strong>Your answer:</strong> ${r.userAnswer}<br>
      <strong>Correct answer:</strong> ${r.correctAnswer}
    </div>`;
  });

  html += `<button class="mt-4 bg-[#6D2932] text-white px-4 py-2 rounded-xl hover:bg-[#561C24]" onclick="restartQuiz()">Play Again</button>`;

  document.getElementById("quiz").innerHTML = html;
}

function restartQuiz() {
  document.getElementById("leaderboard").classList.add("hidden");
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("timer").classList.add("hidden");
  document.getElementById("timer").innerText = "";
  document.getElementById("feedback").innerHTML = "";

  document.getElementById("startScreen").classList.remove("hidden");

  shuffled = [];
  index = 0;
  score = 0;
  results = [];
  timeLeft = 0;
  alreadyAnswered = false;
  selectedDraggedAnswer = null;
}

function saveScore() {
  if (!playerName) return;

  let scores = JSON.parse(localStorage.getItem("leaderboard")) || [];

  scores.push({ name: playerName, score: score });

  scores.sort((a, b) => b.score - a.score);

  scores = scores.slice(0, 10);

  localStorage.setItem("leaderboard", JSON.stringify(scores));

  renderLeaderboard(scores, playerName, score);
}

function renderLeaderboard(scores, currentName, currentScore) {
  let html = `<h3 class="text-xl font-semibold mb-2">🏆 Leaderboard</h3>`;

  scores.forEach((s, i) => {
    const isCurrent = s.name === currentName && s.score === currentScore;
    const bgColor = isCurrent ? "#FFD700" : "#26425A"; 
    const textColor = isCurrent ? "#000000" : "#FFFFFF"; 

    html += `<div class="mb-1 p-2 rounded-xl shadow-md" style="background:${bgColor}; color:${textColor}">
      <strong>${i + 1}. ${s.name}</strong>: ${s.score} pts
    </div>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
  document.getElementById("leaderboard").classList.remove("hidden");
}

</script>
