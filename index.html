<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AP QUIZ 2</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
 color:white;
 background:linear-gradient(to bottom, rgba(0,0,0,.4), rgba(0,0,0,.8)),
 url("IMG.png") center/cover no-repeat fixed;
 min-height:100vh;
 touch-action:none;
}

/* NAVBAR */
.navbar{
 position:absolute;top:20px;left:50%;transform:translateX(-50%);
 width:90%;padding:15px 25px;border-radius:20px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(20px);
 display:flex;justify-content:space-between;
}
.menu-panel{
 position:absolute;top:70px;right:20px;
 background:#111;padding:15px;border-radius:15px;
 display:none;flex-direction:column;gap:10px;
}
.menu-panel.active{display:flex}

/* GAME */
.game-wrapper{
 max-width:500px;margin:120px auto;
 background:#ffd6e7;color:black;
 padding:20px;border-radius:25px;text-align:center;
}

/* CHOICES */
.draggable-choice{
 background:#F06292;color:white;
 padding:12px;margin-top:10px;
 border-radius:15px;font-weight:bold;
 cursor:grab;
 transition:.2s;
}
.draggable-choice.dragging{
 transform:scale(1.08);
 box-shadow:0 10px 25px rgba(0,0,0,.3);
}

/* DROP */
.drop-zone{
 margin-top:15px;padding:20px;
 border:3px dashed #C2185B;
 border-radius:20px;background:#fff0f6;
}
.drop-zone.drag-over{
 background:#f8bbd0;
 transform:scale(1.05);
}

button{
 margin-top:10px;padding:10px 15px;
 border:none;border-radius:10px;
 background:#EC407A;color:white;font-weight:bold;
}
</style>

</head>

<body>

<div class="navbar">
<div>GTECH</div>
<div onclick="toggleMenu()">☰</div>
<div id="menuPanel" class="menu-panel">
<a href="#">Home</a>
<a href="#">Lessons</a>
</div>
</div>

<div class="game-wrapper">
<h1>Drag & Drop in Photoshop</h1>

<div id="startScreen">
<input id="playerName" placeholder="Enter your name">
<select id="difficulty">
<option value="15">Easy</option>
<option value="10">Medium</option>
<option value="5">Hard</option>
</select>
<button onclick="startGame()">Start</button>
</div>

<div id="timer"></div>
<div id="quiz" class="hidden"></div>
<div id="feedback"></div>
<div id="leaderboard"></div>

<audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio> <audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>

</div>

<script>

/* MENU */
function toggleMenu(){
 document.getElementById("menuPanel").classList.toggle("active");
}

/* QUESTIONS */
const questions=[
{q:"Photoshop purpose?",choices:["Gaming","Editing images","Coding","Music"],answer:1},
{q:"Move tool does?",choices:["Delete","Resize","Move layers","Zoom"],answer:2}
];

let index=0,score=0,results=[];
let timer,timeLeft,timePerQ;
let draggedEl=null,offsetX=0,offsetY=0;
let alreadyAnswered=false;

/* START */
function startGame(){
 const name=document.getElementById("playerName").value;
 if(!name)return alert("Enter name");

 document.getElementById("startScreen").style.display="none";
 document.getElementById("quiz").classList.remove("hidden");

 timePerQ=parseInt(document.getElementById("difficulty").value);
 index=0;score=0;
 showQuestion();
}

/* SHOW QUESTION */
function showQuestion(){
 alreadyAnswered=false;

 if(index>=questions.length){showResults();return;}

 const q=questions[index];

 let html=`<h3>${q.q}</h3>
 <div id="dropZone" class="drop-zone">Drop here</div>`;

 q.choices.forEach((c,i)=>{
 html+=`
 <div class="draggable-choice"
 data-answer="${i}"
 onpointerdown="startDrag(event)">
 ${c}
 </div>`;
 });

 document.getElementById("quiz").innerHTML=html;
 startTimer();
}

/* DRAG SYSTEM */
function startDrag(e){
 if(alreadyAnswered)return;

 draggedEl=e.target;
 const rect=draggedEl.getBoundingClientRect();

 offsetX=e.clientX-rect.left;
 offsetY=e.clientY-rect.top;

 draggedEl.style.position="fixed";
 draggedEl.style.zIndex="9999";
 draggedEl.style.width=rect.width+"px";
 draggedEl.classList.add("dragging");

 moveAt(e.clientX,e.clientY);

 document.addEventListener("pointermove",onMove);
 document.addEventListener("pointerup",endDrag);
}

function moveAt(x,y){
 draggedEl.style.left=(x-offsetX)+"px";
 draggedEl.style.top=(y-offsetY)+"px";
}

function onMove(e){
 moveAt(e.clientX,e.clientY);

 const zone=document.getElementById("dropZone");
 const r=zone.getBoundingClientRect();

 if(e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom){
   zone.classList.add("drag-over");
 }else{
   zone.classList.remove("drag-over");
 }
}

function endDrag(e){
 const zone=document.getElementById("dropZone");
 const r=zone.getBoundingClientRect();

 if(e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom){
   const ans=parseInt(draggedEl.dataset.answer);

   draggedEl.style.transition=".2s";
   draggedEl.style.left=r.left+"px";
   draggedEl.style.top=r.top+"px";

   setTimeout(()=>answer(ans),200);
 }else{
   draggedEl.style.position="";
   draggedEl.style.left="";
   draggedEl.style.top="";
 }

 draggedEl.classList.remove("dragging");
 document.removeEventListener("pointermove",onMove);
 document.removeEventListener("pointerup",endDrag);
}

/* ANSWER */
function answer(choice){
 if(alreadyAnswered)return;
 alreadyAnswered=true;

 clearInterval(timer);

 const correct=questions[index].answer;
 const fb=document.getElementById("feedback");

 if(choice===correct){
   fb.innerHTML="✅ Correct!";
   document.getElementById("correctSound").play();
   score++;
 }else{
   fb.innerHTML="❌ Wrong!";
   document.getElementById("wrongSound").play();
 }

 results.push({correct:choice===correct});

 setTimeout(()=>{
   index++;
   showQuestion();
 },1000);
}

/* TIMER */
function startTimer(){
 timeLeft=timePerQ;
 document.getElementById("timer").innerHTML="⏳ "+timeLeft;

 timer=setInterval(()=>{
  timeLeft--;
  document.getElementById("timer").innerHTML="⏳ "+timeLeft;

  if(timeLeft<=0){
   clearInterval(timer);
   answer(-1);
  }
 },1000);
}

/* RESULTS */
function showResults(){
 document.getElementById("quiz").innerHTML=
 `<h2>Score: ${score}/${questions.length}</h2>
 <button onclick="location.reload()">Play Again</button>`;
}

</script>

</body>
</html>
